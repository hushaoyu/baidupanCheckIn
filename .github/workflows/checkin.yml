name: Baidu Netdisk Checkin

on:
  schedule:
    # 每天早上8:30运行（UTC时间，对应北京时间16:30，需要调整为UTC时间）
    # 北京时间8:30 = UTC 0:30
    - cron: '30 0 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  actions: write  # 授予管理工作流的权限

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Set environment variables
        run: |
          echo "BAIDU_COOKIE=${{ secrets.BAIDU_COOKIE }}" >> $GITHUB_ENV
          echo "PRIVACY_MODE=true" >> $GITHUB_ENV
          echo "NOTIFY_METHOD=${{ secrets.NOTIFY_METHOD || 'feishu' }}" >> $GITHUB_ENV
          echo "WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}" >> $GITHUB_ENV

      - name: Run checkin script
        run: |
          python run.py

      - name: Send notification
        run: |
          python notify.py

      - name: 🎉 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 10
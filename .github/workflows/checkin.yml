name: Baidu Netdisk Checkin

on:
  schedule:
    # 每天早上8:00运行（UTC时间，对应北京时间8:00，需要调整为UTC时间）
    # 北京时间8:00 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  actions: write  # 授予管理工作流的权限

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: variables
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create config.py from secrets
        run: |
          # 使用 Python 脚本来创建 config.py，以确保正确处理特殊字符
          cat > create_config.py << 'EOF'
          import os
          import json
          
          # 从环境变量读取 secrets
          secrets = {
              'BAIDU_COOKIE': os.environ.get('BAIDU_COOKIE', ''),
              'PRIVACY_MODE': 'true',
              'NOTIFY_METHOD': os.environ.get('NOTIFY_METHOD', 'feishu'),
              'WEBHOOK_URL': os.environ.get('WEBHOOK_URL', ''),
              'TELEGRAM_BOT_TOKEN': os.environ.get('TELEGRAM_BOT_TOKEN', ''),
              'TELEGRAM_CHAT_ID': os.environ.get('TELEGRAM_CHAT_ID', '')
          }
          
          # 生成 config.py 内容
          with open('config.py', 'w') as f:
              f.write('# 百度网盘签到配置文件\n\n')
              f.write('# ============= 必填配置 =============\n')
              f.write(f"BAIDU_COOKIE = {json.dumps(secrets['BAIDU_COOKIE'])}\n\n")
              f.write('# ============= 可选配置 =============\n')
              f.write(f"PRIVACY_MODE = {json.dumps(secrets['PRIVACY_MODE'])}\n")
              f.write(f"NOTIFY_METHOD = {json.dumps(secrets['NOTIFY_METHOD'])}\n")
              f.write(f"WEBHOOK_URL = {json.dumps(secrets['WEBHOOK_URL'])}\n")
              f.write(f"TELEGRAM_BOT_TOKEN = {json.dumps(secrets['TELEGRAM_BOT_TOKEN'])}\n")
              f.write(f"TELEGRAM_CHAT_ID = {json.dumps(secrets['TELEGRAM_CHAT_ID'])}\n")
          
          print('=== config.py created ===')
          print(f'BAIDU_COOKIE length: {len(secrets["BAIDU_COOKIE"])}')
          EOF
          
          python3 create_config.py
          rm create_config.py
        env:
          BAIDU_COOKIE: ${{ secrets.BAIDU_COOKIE }}
          NOTIFY_METHOD: ${{ secrets.NOTIFY_METHOD || 'feishu' }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run checkin script
        run: |
          python run.py

      - name: Send notification
        run: |
          python notify.py

      - name: 🎉 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 10